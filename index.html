<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V I B E</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #000;
            font-family: 'Times New Roman', serif;
            display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }

        /* Image du gars en fond */
        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=2000') no-repeat center center;
            background-size: cover;
            filter: brightness(0.4);
            z-index: -1;
        }

        /* Le "téléphone" au centre */
        .phone-frame {
            width: 320px;
            height: 650px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #333;
            border-radius: 40px;
            padding: 30px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 32px;
            letter-spacing: 10px;
            margin-top: 40px;
            background: linear-gradient(to bottom, #f3e5ab, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-top: 50px;
        }

        .city {
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 25px 10px;
            text-align: center;
            font-size: 11px;
            letter-spacing: 2px;
            color: #aaa;
            text-transform: uppercase;
        }

        .city.active {
            border: 2px solid #d4af37;
            color: #fff;
            box-shadow: 0 0 10px rgba(212,175,55,0.3);
        }

        .input-group {
            margin-top: auto;
            width: 100%;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
            width: 80%;
        }

        .arrow {
            color: #d4af37;
            text-decoration: none;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <div class="phone-frame">
        <div class="logo">V I B E</div>
        
        <div class="grid">
            <div class="city active">MONTREAL</div>
            <div class="city">QUEBEC</div>
            <div class="city">OTTAWA</div>
            <div class="city">TORONTO</div>
        </div>

        <div class="input-group">
            <input type="text" placeholder="Votre Prénom">
            <a href="#" class="arrow">➔</a>
        </div>
    </div>
</body>
</html>
