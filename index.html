<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V I B E</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #000;
            font-family: 'Times New Roman', serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* L'IMAGE DU GARS EN COMPLET ET LES LUMIÈRES */
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://hebbkx1anhila5yf.public.blob.vercel-storage.com/image-xbyXp4L1VbI2X0Y2X0Y2X0Y2X0Y2X0.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        /* LE CADRE DU TÉLÉPHONE */
        .phone-frame {
            width: 320px;
            height: 650px;
            background: #0a0a0a;
            border: 8px solid #333;
            border-radius: 40px;
            padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            position: relative;
        }

        /* LE LOGO V I B E DORÉ */
        .logo {
            font-size: 32px;
            letter-spacing: 12px;
            margin-top: 50px;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            font-weight: bold;
        }

        /* LA GRILLE DES VILLES */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-top: 60px;
        }

        .city {
            border: 1px solid #444;
            padding: 25px 5px;
            text-align: center;
            font-size: 10px;
            letter-spacing: 2px;
            color: #888;
            text-transform: uppercase;
        }

        /* MONTREAL EN DORÉ */
        .active {
            border: 2px solid #d4af37;
            color: #d4af37;
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.2);
        }

        /* BAS DE PAGE (PRÉNOM) */
        .footer {
            margin-top: auto;
            width: 100%;
            margin-bottom: 40px;
            border-bottom: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
        }

        .footer span {
            color: #666;
            font-size: 14px;
        }

        .arrow {
            color: #d4af37;
            font-size: 20px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="phone-frame">
        <div class="logo">V I B E</div>
        
        <div class="grid">
            <div class="city active">MONTREAL</div>
            <div class="city">QUEBEC</div>
            <div class="city">OTTAWA</div>
            <div class="city">TORONTO</div>
        </div>

        <div class="footer">
            <span>Votre Prénom</span>
            <a href="#" class="arrow">➔</a>
        </div>
    </div>
</body>
</html>
